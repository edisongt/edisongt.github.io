<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Edison Home | Garden of Eden</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; user-select: none;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; }

    /* ── Sky ── */
    #sky { position: fixed; inset: 0; z-index: 0; }

    /* ── Stars canvas ── */
    #stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Sun ── */
    #sun {
      position: fixed; z-index: 4; pointer-events: none;
      transform: translate(-50%, -50%); border-radius: 50%;
      width: clamp(46px, 6.5vw, 84px); height: clamp(46px, 6.5vw, 84px);
    }

    /* ── Moon ── */
    #moon {
      position: fixed; z-index: 4; pointer-events: none;
      transform: translate(-50%, -50%); border-radius: 50%;
      width: clamp(34px, 5vw, 64px); height: clamp(34px, 5vw, 64px);
    }

    /* ── Scene container ── */
    #scene { position: fixed; inset: 0; z-index: 10; }

    /* ── Background mountains ── */
    #mountains { position: absolute; bottom: 0; left: 0; width: 100%; height: 45%; z-index: 1; }

    /* ── Tree wrappers ── */
    .tree-wrap {
      position: absolute; bottom: 20%;
      height: clamp(260px, 54vh, 500px);
      z-index: 3; cursor: pointer;
    }
    .tree-wrap svg { height: 100%; width: auto; display: block; }

    #life-wrap {
      left: 3%;
      filter: drop-shadow(0 0 22px rgba(109,255,210,.5));
      transition: filter .4s;
    }
    #life-wrap:hover  { filter: drop-shadow(0 0 46px rgba(109,255,210,.95)); }

    #know-wrap {
      right: 3%;
      filter: drop-shadow(0 0 22px rgba(200,160,0,.5));
      transition: filter .4s;
    }
    #know-wrap:hover  { filter: drop-shadow(0 0 46px rgba(255,215,0,.95)); }

    /* ── Tree labels ── */
    .tree-label {
      display: block; text-align: center;
      font-size: clamp(0.95rem, 2vw, 1.3rem); font-weight: 700;
      letter-spacing: .12em; margin-top: 5px;
      text-shadow: 0 1px 14px rgba(0,0,0,.9);
    }
    .life-color  { color: rgba(109,255,210,.95); }
    .know-color  { color: rgba(255,215,0,.95); }

    /* ── Large single ivory rotating cube ── */
    #people-wrap {
      position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%);
      z-index: 4; pointer-events: none;
      display: flex; flex-direction: column; align-items: center;
    }
    .cube-grid {
      animation: cubeFloat 4s ease-in-out infinite;
      display: flex; align-items: center; justify-content: center;
    }
    @keyframes cubeFloat {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-20px); }
    }
    .cube-wrap {
      --sz: clamp(100px, 14vw, 180px);
      width: var(--sz); height: var(--sz);
      perspective: 1200px;
    }
    .cube-3d {
      width: 100%; height: 100%;
      position: relative; transform-style: preserve-3d;
      animation: spinAll 10s linear infinite;
    }
    .cube-3d .face {
      position: absolute; width: 100%; height: 100%;
      background: rgba(255, 255, 240, 0.97);
      border: 2px solid rgba(200, 190, 140, 0.70);
      box-shadow: inset 0 0 18px rgba(220,210,160,.35), 0 0 8px rgba(200,190,130,.30);
      backface-visibility: visible;
    }
    .cube-3d .front  { transform: translateZ(calc(var(--sz)/2)); }
    .cube-3d .back   { transform: rotateY(180deg) translateZ(calc(var(--sz)/2)); }
    .cube-3d .left   { transform: rotateY(-90deg) translateZ(calc(var(--sz)/2)); }
    .cube-3d .right  { transform: rotateY(90deg)  translateZ(calc(var(--sz)/2)); }
    .cube-3d .top    { transform: rotateX(90deg)  translateZ(calc(var(--sz)/2)); }
    .cube-3d .bottom { transform: rotateX(-90deg) translateZ(calc(var(--sz)/2)); }
    @keyframes spinAll {
      0%   { transform: rotateX(0deg)   rotateY(0deg)   rotateZ(0deg); }
      100% { transform: rotateX(360deg) rotateY(540deg) rotateZ(180deg); }
    }

    /* ── Deer by the river ── */
    #deer-wrap {
      position: absolute; bottom: 19%; left: 22%;
      z-index: 3; pointer-events: none;
      width: clamp(70px, 10vw, 130px);
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.65));
      animation: deerBob 5s ease-in-out infinite;
    }
    @keyframes deerBob {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-4px); }
    }

    /* ── White dove flying ── */
    #dove-wrap {
      position: absolute; top: 10%; left: 0;
      z-index: 4; pointer-events: none;
      width: clamp(44px, 6.5vw, 88px);
      animation: doveFly 26s linear infinite;
    }
    #dove-svg {
      width: 100%; height: auto;
      filter: drop-shadow(0 2px 8px rgba(180,210,255,.60));
      animation: doveFlap 0.55s ease-in-out infinite;
    }
    @keyframes doveFly {
      0%    { transform: translateX(-10vw) translateY(0)     scaleX(1); }
      47%   { transform: translateX(108vw) translateY(-6vh)  scaleX(1); }
      50%   { transform: translateX(108vw) translateY(-6vh)  scaleX(-1); }
      97%   { transform: translateX(-10vw) translateY(0)     scaleX(-1); }
      100%  { transform: translateX(-10vw) translateY(0)     scaleX(1); }
    }
    @keyframes doveFlap {
      0%,100% { transform: scaleY(1)    rotate(-2deg); }
      50%     { transform: scaleY(0.82) rotate(2deg); }
    }
    #river-label {
      position: absolute; bottom: 23%; left: 50%; transform: translateX(-50%);
      z-index: 3; color: rgba(180,225,255,.88);
      font-size: clamp(0.78rem, 1.6vw, 1.05rem);
      font-style: italic; letter-spacing: .18em;
      text-shadow: 0 1px 8px rgba(0,0,0,.8), 0 0 24px rgba(80,160,255,.55);
      pointer-events: none; white-space: nowrap;
    }

    /* ── Ground / River SVG ── */
    #ground-svg { position: absolute; bottom: 0; left: 0; width: 100%; height: 38%; z-index: 2; }
    @keyframes riverShimmer { 0%,100%{opacity:.82} 50%{opacity:.95} }
    #river-main { animation: riverShimmer 5s ease-in-out infinite; }

    /* ── Fireflies ── */
    .ff {
      position: absolute; width: 5px; height: 5px;
      border-radius: 50%; background: rgba(255,255,195,.9);
      pointer-events: none; z-index: 5;
    }
    @keyframes ffMove {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(var(--a),var(--b)); }
      60%  { transform: translate(var(--c),var(--d)); }
      100% { transform: translate(var(--e),var(--f)); }
    }
    @keyframes ffGlow {
      0%,100% { opacity:.08; box-shadow: 0 0 3px 1px rgba(255,255,180,.15); }
      50%      { opacity:1;   box-shadow: 0 0 9px 5px rgba(255,255,180,.9); }
    }

    /* ── Leaf / Apple particles ── */
    .leaf-p {
      position: absolute; border-radius: 55% 10% 55% 10%;
      pointer-events: none; z-index: 6; opacity: 0;
      animation: leafFall var(--dur,5s) ease-in forwards;
    }
    .apple-p {
      position: absolute; border-radius: 50% 50% 55% 45%;
      pointer-events: none; z-index: 6;
      width: 14px; height: 15px;
      background: radial-gradient(circle at 32% 28%, #ff9999, #dc2626, #7f1d1d);
      animation: appleFall var(--dur,3.5s) cubic-bezier(.25,0,1,1) forwards;
    }
    @keyframes leafFall {
      0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 0; }
      12%  { opacity: 1; }
      85%  { opacity: .7; }
      100% { transform: translate(var(--dx,50px),var(--dy,110px)) rotate(var(--rot,380deg)) scale(.35); opacity: 0; }
    }
    @keyframes appleFall {
      0%   { transform: translateX(var(--dx,0)) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(var(--dx,0)) translateY(var(--dy,160px)) rotate(var(--rot,210deg)); opacity: 0; }
    }

    /* ── Tree sway ── */
    .sway-l { animation: swayL 7s ease-in-out infinite; transform-origin: 50% 96%; }
    .sway-r { animation: swayR 9s ease-in-out infinite; transform-origin: 50% 96%; }
    @keyframes swayL { 0%,100%{transform:rotate(-1.8deg)} 50%{transform:rotate(1.8deg)} }
    @keyframes swayR { 0%,100%{transform:rotate( 1.8deg)} 50%{transform:rotate(-1.8deg)} }

    /* ── Overlay ── */
    #overlay {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      pointer-events: none; display: flex; flex-direction: column;
      align-items: center; gap: .3rem; text-align: center; color: #fff;
      padding: clamp(1.2rem,3.5vh,2.5rem) 1rem;
    }
    #overlay .eyebrow {
      text-transform: uppercase; letter-spacing: .35em;
      font-size: clamp(0.85rem, 1.5vw, 1rem); opacity: .65;
    }
    #overlay h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.05;
      text-shadow: 0 2px 32px rgba(0,0,0,.9), 0 0 60px rgba(109,255,210,.25);
    }
    #overlay .tag {
      font-size: clamp(1rem, 2.2vw, 1.4rem); opacity: .78;
      text-shadow: 0 1px 16px rgba(0,0,0,.8); max-width: 560px;
    }

    /* ── Hint ── */
    #hint {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.5); font-size: clamp(0.85rem, 1.5vw, 1rem); z-index: 20;
      pointer-events: none; text-align: center; white-space: nowrap;
      animation: hintPulse 3s ease-in-out infinite;
    }
    @keyframes hintPulse { 0%,100%{opacity:.3} 50%{opacity:.75} }

    /* ── Rainbow ── */
    #rainbow-svg {
      position: absolute; top: 2%; left: 0; width: 100%; height: 52%;
      z-index: 2; pointer-events: none;
    }

    /* ── Animals & Flower on the grass ── */
    .animal-wrap {
      position: absolute; z-index: 3; pointer-events: none;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,.52));
    }
    #flower-wrap   { bottom: 21%; left: 33%; width: clamp(22px, 3vw,   42px);  animation: deerBob  4s   ease-in-out infinite; }
    #lamb-wrap     { bottom: 20%; left: 39%; width: clamp(44px, 6vw,   80px);  animation: deerBob  5.5s ease-in-out -1s    infinite; }
    #cow-wrap      { bottom: 20%; left: 45%; width: clamp(60px, 9vw,  116px);  animation: deerBob  6s   ease-in-out -2s    infinite; }
    #chicken-wrap  { bottom: 21%; left: 52%; width: clamp(30px, 4vw,   54px);  animation: deerBob  3.5s ease-in-out -0.5s  infinite; }
    #cat-wrap      { bottom: 20%; left: 58%; width: clamp(38px, 5.5vw, 74px);  animation: deerBob  4.5s ease-in-out -1.5s  infinite; }
    #dog-wrap      { bottom: 20%; left: 64%; width: clamp(46px, 7vw,   92px);  animation: deerBob  5s   ease-in-out -3s    infinite; }
    #elephant-wrap { bottom: 20%; left: 70%; width: clamp(62px, 9vw,  118px);  animation: deerBob  7s   ease-in-out -2s    infinite; }
    #lion-wrap     { bottom: 20%; left: 77%; width: clamp(54px, 8vw,  106px);  animation: deerBob  6.5s ease-in-out -1s    infinite; }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .sway-l, .sway-r, .ff, .animal-wrap { animation: none !important; }
    }
  </style>
</head>
<body>

<!-- 1. Sky gradient (JS-animated) -->
<div id="sky"></div>

<!-- 2. Stars canvas -->
<canvas id="stars"></canvas>

<!-- 2b. Breeze particles canvas (daytime) -->
<canvas id="breeze" style="position:fixed;inset:0;z-index:2;pointer-events:none;"></canvas>

<!-- 3. Sun & Moon -->
<div id="sun"></div>
<div id="moon"></div>

<!-- 4. Scene -->
<div id="scene">

  <!-- Background mountains -->
  <svg id="mountains" viewBox="0 0 1440 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="mg1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#183a22"/><stop offset="100%" stop-color="#0a2215"/>
      </linearGradient>
      <linearGradient id="mg2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#265c32"/><stop offset="100%" stop-color="#0d3018"/>
      </linearGradient>
    </defs>
    <path d="M0 400 L0 260 Q150 145,300 195 Q450 245,600 155 Q750 65,900 145
             Q1050 225,1200 155 Q1320 95,1440 185 L1440 400 Z"
          fill="url(#mg1)" opacity=".65"/>
    <path d="M0 400 L0 320 Q200 248,380 285 Q560 322,720 268
             Q880 214,1060 268 Q1240 322,1440 285 L1440 400 Z"
          fill="url(#mg2)" opacity=".78"/>
    <!-- Lili on the mountain peak -->
    <g id="lili" role="img" aria-label="Lili standing on the mountain peak" transform="translate(750,55)">
      <title>Lili</title>
      <desc>A figure named Lili standing on the highest mountain peak</desc>
      <!-- Head -->
      <circle cx="0" cy="-22" r="7" fill="#f5c5a0"/>
      <!-- Hair -->
      <ellipse cx="0" cy="-26" rx="7.5" ry="5" fill="#4a2200"/>
      <!-- Body -->
      <line x1="0" y1="-15" x2="0" y2="5" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/>
      <!-- Arms -->
      <line x1="0" y1="-10" x2="-9" y2="-2" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="-10" x2="9" y2="-4" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="0" y1="5" x2="-6" y2="16" stroke="#3a2a7a" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="5" x2="6" y2="16" stroke="#3a2a7a" stroke-width="3" stroke-linecap="round"/>
      <!-- Name label -->
      <text x="0" y="-34" text-anchor="middle" font-family="sans-serif" font-size="11"
            font-weight="bold" fill="#ffffff" stroke="#000" stroke-width="0.5">Lili</text>
    </g>
  </svg>

  <!-- Rainbow in the sky -->
  <svg id="rainbow-svg" viewBox="0 0 1440 560" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="rbBlur"><feGaussianBlur stdDeviation="3.5"/></filter>
    </defs>
    <g filter="url(#rbBlur)" opacity="0.72">
      <path d="M0 560 Q720 -80 1440 560" fill="none" stroke="hsl(0,82%,56%)"    stroke-width="30"/>
      <path d="M30 560 Q720 -52 1410 560"  fill="none" stroke="hsl(28,90%,58%)"  stroke-width="25"/>
      <path d="M60 560 Q720 -26 1380 560"  fill="none" stroke="hsl(55,92%,60%)"  stroke-width="25"/>
      <path d="M90 560 Q720  -4 1350 560"  fill="none" stroke="hsl(110,74%,48%)" stroke-width="23"/>
      <path d="M120 560 Q720  16 1320 560" fill="none" stroke="hsl(215,80%,58%)" stroke-width="23"/>
      <path d="M150 560 Q720  34 1290 560" fill="none" stroke="hsl(248,75%,60%)" stroke-width="22"/>
      <path d="M180 560 Q720  50 1260 560" fill="none" stroke="hsl(290,70%,62%)" stroke-width="21"/>
    </g>
  </svg>

  <!-- ══════════════════════════════════════════════
       LIFE TREE  生命樹  (left)
  ══════════════════════════════════════════════ -->
  <div class="tree-wrap" id="life-wrap" role="img" aria-label="Tree of Life">
    <svg viewBox="0 0 220 420" xmlns="http://www.w3.org/2000/svg" class="sway-l">
      <defs>
        <radialGradient id="lg1" cx="32%" cy="28%">
          <stop offset="0%"   stop-color="#d4fff2"/>
          <stop offset="38%"  stop-color="#6dffd2"/>
          <stop offset="72%"  stop-color="#2db87c"/>
          <stop offset="100%" stop-color="#0d5c36"/>
        </radialGradient>
        <radialGradient id="lg2" cx="30%" cy="25%">
          <stop offset="0%"   stop-color="#baffea"/>
          <stop offset="45%"  stop-color="#46d27c"/>
          <stop offset="85%"  stop-color="#1b6f46"/>
        </radialGradient>
        <radialGradient id="lgGlow" cx="50%" cy="50%">
          <stop offset="0%"   stop-color="#6dffd2" stop-opacity=".55"/>
          <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="lgRoot" cx="50%" cy="40%">
          <stop offset="0%"   stop-color="#ffd700" stop-opacity=".6"/>
          <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="lgFruit" cx="30%" cy="28%">
          <stop offset="0%"   stop-color="#fffde7"/>
          <stop offset="50%"  stop-color="#ffd700"/>
          <stop offset="100%" stop-color="#ff9800"/>
        </radialGradient>
        <linearGradient id="ltk1" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#9b6040"/>
          <stop offset="60%"  stop-color="#7a4c2d"/>
          <stop offset="100%" stop-color="#5a3820"/>
        </linearGradient>
        <linearGradient id="ltk2" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#c88060"/>
          <stop offset="100%" stop-color="#9b6040"/>
        </linearGradient>
        <filter id="lgBlur"><feGaussianBlur stdDeviation="4"/></filter>
      </defs>

      <!-- Root glow -->
      <ellipse cx="110" cy="412" rx="72" ry="16" fill="url(#lgRoot)" filter="url(#lgBlur)"/>

      <!-- Surface roots -->
      <path d="M103 408 C88 400,66 398,50 406"  stroke="#5a3820" stroke-width="8"  fill="none" stroke-linecap="round" opacity=".8"/>
      <path d="M117 408 C132 400,154 398,170 406" stroke="#5a3820" stroke-width="8"  fill="none" stroke-linecap="round" opacity=".8"/>
      <path d="M108 414 C100 408,88 410,80 418"   stroke="#5a3820" stroke-width="6"  fill="none" stroke-linecap="round" opacity=".6"/>
      <path d="M112 414 C120 408,132 410,140 418"  stroke="#5a3820" stroke-width="6"  fill="none" stroke-linecap="round" opacity=".6"/>

      <!-- Single trunk (filled closed shape for one-trunk appearance) -->
      <path d="M102 415 C97 360,93 318,97 272 C91 242,87 202,96 162 C100 143,106 123,110 106
               C114 123,120 143,124 162 C133 202,129 242,123 272 C127 318,123 360,118 415 Z"
            fill="url(#ltk1)"/>
      <!-- Highlight strip for depth -->
      <path d="M110 415 C108 358,107 316,109 270 C107 240,107 200,109 162 C110 143,110 123,110 106"
            stroke="url(#ltk2)" stroke-width="7" fill="none" stroke-linecap="round" opacity=".55"/>

      <!-- Lower branches -->
      <path d="M99 258 C78 242,56 230,36 210"   stroke="#7a4c2d" stroke-width="12" fill="none" stroke-linecap="round"/>
      <path d="M121 258 C142 242,164 230,184 210" stroke="#7a4c2d" stroke-width="12" fill="none" stroke-linecap="round"/>
      <!-- Upper branches -->
      <path d="M97 200 C76 180,56 160,40 132"   stroke="#7a4c2d" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M123 200 C144 180,164 160,180 132" stroke="#7a4c2d" stroke-width="10" fill="none" stroke-linecap="round"/>
      <!-- Slender top branches -->
      <path d="M103 155 C90 134,80 112,76 90"   stroke="#8a5c3d" stroke-width="7"  fill="none" stroke-linecap="round"/>
      <path d="M117 155 C130 134,140 112,144 90"  stroke="#8a5c3d" stroke-width="7"  fill="none" stroke-linecap="round"/>

      <!-- Glow aura (behind canopy) -->
      <ellipse cx="110" cy="140" rx="95" ry="108" fill="url(#lgGlow)" filter="url(#lgBlur)"/>

      <!-- Canopy — outer (low opacity) -->
      <circle cx="36"  cy="206" r="40" fill="url(#lg2)" opacity=".68"/>
      <circle cx="184" cy="206" r="40" fill="url(#lg2)" opacity=".68"/>
      <circle cx="40"  cy="126" r="32" fill="url(#lg2)" opacity=".64"/>
      <circle cx="180" cy="126" r="32" fill="url(#lg2)" opacity=".64"/>
      <!-- Canopy — mid -->
      <ellipse cx="110" cy="206" rx="78" ry="68" fill="url(#lg1)" opacity=".86"/>
      <circle cx="70"  cy="160" r="50" fill="url(#lg1)" opacity=".82"/>
      <circle cx="150" cy="160" r="50" fill="url(#lg1)" opacity=".82"/>
      <!-- Canopy — upper -->
      <ellipse cx="110" cy="108" rx="67" ry="63" fill="url(#lg1)" opacity=".92"/>
      <circle cx="75"  cy="88"  r="40" fill="url(#lg1)" opacity=".86"/>
      <circle cx="145" cy="88"  r="40" fill="url(#lg1)" opacity=".86"/>
      <!-- Crown -->
      <ellipse cx="110" cy="50" rx="44" ry="42" fill="url(#lg1)" opacity=".9"/>

      <!-- Golden fruits of life -->
      <circle cx="82"  cy="102" r="8" fill="url(#lgFruit)"/>
      <circle cx="138" cy="92"  r="7" fill="url(#lgFruit)"/>
      <circle cx="107" cy="62"  r="7" fill="url(#lgFruit)"/>
      <circle cx="127" cy="133" r="6" fill="url(#lgFruit)" opacity=".9"/>
      <circle cx="92"  cy="152" r="6" fill="url(#lgFruit)" opacity=".85"/>
      <circle cx="136" cy="166" r="5" fill="url(#lgFruit)" opacity=".8"/>
    </svg>
    <span class="tree-label life-color">Tree of Life</span>
  </div>

  <!-- ══════════════════════════════════════════════
       KNOWLEDGE TREE  善惡知識樹  (right)
  ══════════════════════════════════════════════ -->
  <div class="tree-wrap" id="know-wrap" role="img" aria-label="Tree of Knowledge">
    <svg viewBox="0 0 220 420" xmlns="http://www.w3.org/2000/svg" class="sway-r">
      <defs>
        <radialGradient id="kg1" cx="32%" cy="28%">
          <stop offset="0%"   stop-color="#fff0a0"/>
          <stop offset="40%"  stop-color="#ffd700"/>
          <stop offset="75%"  stop-color="#b8860b"/>
          <stop offset="100%" stop-color="#6b4c00"/>
        </radialGradient>
        <radialGradient id="kg2" cx="30%" cy="25%">
          <stop offset="0%"   stop-color="#ffe566"/>
          <stop offset="45%"  stop-color="#cfa000"/>
          <stop offset="85%"  stop-color="#7a5c00"/>
        </radialGradient>
        <radialGradient id="kgGlow" cx="50%" cy="50%">
          <stop offset="0%"   stop-color="#ffd700" stop-opacity=".6"/>

<!-- Text overlay -->
<div id="overlay">
  <p class="eyebrow">Edison Home</p>
  <h1>Garden of Eden</h1>
  <p class="tag">The Source of Life, the Realm of Good &amp; Evil — An Eternal Cycle of Light and Dark</p>
</div>

<!-- Interaction hint -->
<div id="hint">🌿 Click the Tree of Life or the Tree of Knowledge to interact 🍎</div>

<script>
/* ── Build single large ivory rotating cube ── */
(function () {
  const grid  = document.getElementById('cube-grid');
  const faces = ['front','back','left','right','top','bottom'];
  const wrap  = document.createElement('div');
  wrap.className = 'cube-wrap';
  const cube  = document.createElement('div');
  cube.className = 'cube-3d';
  faces.forEach(function (f) {
    const face = document.createElement('div');
    face.className = 'face ' + f;
    cube.appendChild(face);
  });
  wrap.appendChild(cube);
  grid.appendChild(wrap);
})();

/* ============================================================
   DAY / NIGHT CYCLE
   t = 0.00 → midnight  |  t = 0.25 → sunrise  |  t = 0.50 → noon
   t = 0.75 → sunset    |  t = 1.00 → midnight
   Sun visible: t ∈ [0.24, 0.76]   Moon visible: opposite half
============================================================ */
const DAY_NIGHT_CYCLE_MS = 90000; // milliseconds for one full day/night cycle

const skyEl    = document.getElementById('sky');
const sunEl    = document.getElementById('sun');
const moonEl   = document.getElementById('moon');
const starsCv  = document.getElementById('stars');
const starsCtx = starsCv.getContext('2d');
const breezeCv  = document.getElementById('breeze');
const breezeCtx = breezeCv.getContext('2d');

/* ── Stars ── */
let starList = [];
function resizeStars() {
  starsCv.width  = window.innerWidth;
  starsCv.height = window.innerHeight;
}
function initStars(count = 220) {
  starList = Array.from({length: count}, () => ({
    x:  Math.random(),
    y:  Math.random() * 0.65,
    r:  Math.random() * 1.4 + 0.3,
    tw: Math.random() * Math.PI * 2
  }));
}
function drawStars(alpha) {
  starsCtx.clearRect(0, 0, starsCv.width, starsCv.height);
  if (alpha < 0.01) return;
  const now = Date.now() / 1000;
  starList.forEach(s => {
    const a = alpha * (0.5 + 0.5 * Math.sin(now + s.tw));
    starsCtx.beginPath();
    starsCtx.arc(s.x * starsCv.width, s.y * starsCv.height, s.r, 0, Math.PI * 2);
    starsCtx.fillStyle = `rgba(255,255,220,${a})`;
    starsCtx.fill();
  });
}

/* ── Breeze particles (daytime) ── */
let breezeList = [];
function resizeBreeze() {
  breezeCv.width  = window.innerWidth;
  breezeCv.height = window.innerHeight;
}
function initBreeze(count = 70) {
  breezeList = Array.from({length: count}, () => ({
    x:   Math.random(),
    y:   Math.random(),
    r:   Math.random() * 2.2 + 0.5,
    vx:  (Math.random() * 0.5 + 0.15) * 0.00018,
    vy: -(Math.random() * 0.4 + 0.12) * 0.00028,
    wo:  Math.random() * Math.PI * 2,
    ws:  Math.random() * 1.2 + 0.3,
    hue: 85 + Math.floor(Math.random() * 55),
    sat: 28 + Math.floor(Math.random() * 30),
    lit: 74 + Math.floor(Math.random() * 22),
    base: Math.random() * 0.32 + 0.07
  }));
}
function drawBreeze(alpha) {
  const W = breezeCv.width, H = breezeCv.height;
  breezeCtx.clearRect(0, 0, W, H);
  if (alpha < 0.01) return;
  const now = Date.now() / 1000;
  breezeList.forEach(p => {
    const wobble = Math.sin(now * p.ws + p.wo) * 0.00007;
    p.x += p.vx + wobble;
    p.y += p.vy;
    if (p.y < -0.05) { p.y = 1.05; p.x = Math.random(); }
    if (p.x >  1.05) { p.x = -0.05; }
    const a = alpha * p.base * (0.55 + 0.45 * Math.sin(now * p.ws * 0.7 + p.wo));
    breezeCtx.beginPath();
    breezeCtx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    breezeCtx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${a})`;
    breezeCtx.fill();
  });
}

/* ── Colour helpers ── */
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp01(v)     { return Math.max(0, Math.min(1, v)); }
function lerpC(c1, c2, t) {
  return [
    Math.round(lerp(c1[0], c2[0], t)),
    Math.round(lerp(c1[1], c2[1], t)),
    Math.round(lerp(c1[2], c2[2], t))
  ];
}
function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

/* Sky gradient keyframes: [t, topRGB, midRGB, botRGB] */
const SKY_KF = [
  [0.00, [4,4,16],     [8,8,28],      [5,6,22]      ], // midnight
  [0.20, [8,6,35],     [25,15,55],    [55,25,25]     ], // pre-dawn
  [0.27, [28,38,78],   [170,75,28],   [210,120,45]   ], // dawn
  [0.35, [75,130,215], [130,180,235], [190,215,235]  ], // morning
  [0.50, [25,95,215],  [65,145,225],  [120,195,235]  ], // noon
  [0.65, [55,115,195], [125,175,225], [195,215,235]  ], // afternoon
  [0.73, [35,45,95],   [195,75,28],   [225,115,28]   ], // dusk
  [0.80, [18,12,52],   [55,22,65],    [38,18,48]     ], // evening
  [1.00, [4,4,16],     [8,8,28],      [5,6,22]       ], // midnight (wrap)
];

function getSkyColors(t) {
  let i = 0;
  while (i < SKY_KF.length - 1 && SKY_KF[i + 1][0] <= t) i++;
  const a = SKY_KF[i], b = SKY_KF[i + 1];
  const lt = (t - a[0]) / (b[0] - a[0]);
  return {
    top: lerpC(a[1], b[1], lt),
    mid: lerpC(a[2], b[2], lt),
    bot: lerpC(a[3], b[3], lt)
  };
}

/* Sun & moon cross the horizon at t = DAWN_T (sunrise) and t = 1 - DAWN_T (sunset). */
const DAWN_T = 0.24; // fraction of the day cycle at which the sun rises / moon sets

/* Celestial body arc position.
   riseT / setT are the t-values at which it crosses the horizon. */
function celestialPos(t, riseT, setT) {
  if (t < riseT || t > setT) return null;
  const norm = (t - riseT) / (setT - riseT);            // 0 → 1
  const vx   = window.innerWidth  * (0.03 + norm * 0.94);
  const vy   = window.innerHeight * (0.88 - 0.75 * Math.sin(norm * Math.PI));
  return { x: vx, y: vy, norm };
}

function moonPos(t) {
  const mt = (t + 0.5) % 1;
  return celestialPos(mt, DAWN_T, 1 - DAWN_T);
}

/* Start the cycle at dawn so the page always opens with a sunrise. */
const startTime = Date.now() - DAY_NIGHT_CYCLE_MS * DAWN_T;

function tick() {
  const t  = ((Date.now() - startTime) % DAY_NIGHT_CYCLE_MS) / DAY_NIGHT_CYCLE_MS;
  const sc = getSkyColors(t);

  /* Sky */
  skyEl.style.background =
    `linear-gradient(180deg, ${rgb(sc.top)} 0%, ${rgb(sc.mid)} 55%, ${rgb(sc.bot)} 100%)`;

  /* Stars — only at night */
  let starA = 0;
  if      (t < 0.20)               starA = 1;
  else if (t < 0.30)               starA = 1 - (t - 0.20) / 0.10;
  else if (t >= 0.70 && t < 0.80)  starA = (t - 0.70) / 0.10;
  else if (t >= 0.80)              starA = 1;
  drawStars(clamp01(starA));

  /* Breeze particles — only during the day */
  let breezeA = 0;
  if      (t >= 0.30 && t < 0.35)  breezeA = (t - 0.30) / 0.05;
  else if (t >= 0.35 && t < 0.65)  breezeA = 1;
  else if (t >= 0.65 && t < 0.70)  breezeA = 1 - (t - 0.65) / 0.05;
  drawBreeze(clamp01(breezeA));

  /* Sun */
  const sp = celestialPos(t, DAWN_T, 1 - DAWN_T);
  if (sp) {
    sunEl.style.display = 'block';
    sunEl.style.left    = sp.x + 'px';
    sunEl.style.top     = sp.y + 'px';
    const low   = sp.norm < 0.13 || sp.norm > 0.87;
    const hue   = low ? 22 : 45;
    const inner = low ? '#ffe0b2' : '#fffde7';
    sunEl.style.background  =
      `radial-gradient(circle, ${inner} 15%, hsl(${hue},100%,62%) 50%, hsl(${hue - 10},90%,50%) 78%, transparent)`;
    sunEl.style.boxShadow   = low
      ? '0 0 45px 18px rgba(255,155,55,.75)'
      : '0 0 65px 28px rgba(255,210,0,.65)';
  } else {
    sunEl.style.display = 'none';
  }

  /* Moon */
  const mp = moonPos(t);
  if (mp) {
    moonEl.style.display    = 'block';
    moonEl.style.left       = mp.x + 'px';
    moonEl.style.top        = mp.y + 'px';
    moonEl.style.background = 'radial-gradient(circle at 42% 38%, #fffde7 42%, #d4d8e8 78%, #8888a8)';
    moonEl.style.boxShadow  = '0 0 32px 10px rgba(200,215,255,.38)';
  } else {
    moonEl.style.display = 'none';
  }

  /* Life-tree glow strengthens during the day */
  const dayness = (t > DAWN_T && t < 1 - DAWN_T)
    ? Math.sin((t - DAWN_T) / (1 - 2 * DAWN_T) * Math.PI)
    : 0;
  document.getElementById('life-wrap').style.filter =
    `drop-shadow(0 0 ${22 + dayness * 20}px rgba(109,255,210,${0.38 + dayness * 0.22}))`;

  requestAnimationFrame(tick);
}

window.addEventListener('resize', () => { resizeStars(); resizeBreeze(); initStars(); });
resizeStars();
resizeBreeze();
initStars();
initBreeze();
tick();

/* ============================================================
   FIREFLIES
============================================================ */
const ffBox = document.getElementById('fireflies');
function rand(a, b) { return +(a + Math.random() * (b - a)).toFixed(1); }

for (let i = 0; i < 30; i++) {
  const ff = document.createElement('div');
  ff.className = 'ff';
  ff.style.cssText = `
    left:${rand(5,92)}%; bottom:${rand(18,65)}%;
    animation:
      ffMove ${rand(7,15)}s ease-in-out ${rand(-12,0)}s infinite,
      ffGlow ${rand(1.4,3)}s ease-in-out ${rand(-3,0)}s infinite;
    --a:${rand(-30,30)}px; --b:${rand(-45,5)}px;
    --c:${rand(-45,45)}px; --d:${rand(-65,-8)}px;
    --e:${rand(-20,55)}px; --f:${rand(-50,-5)}px;
  `;
  ffBox.appendChild(ff);
}

/* ============================================================
   INTERACTIVE TREE BURSTS
============================================================ */
const particlesEl = document.getElementById('particles');

const LIFE_COLORS = ['#d4fff2','#6dffd2','#2db87c','#baffea','#46d27c','#a8ffd8'];
const KNOW_COLORS = ['#7a3090','#4a1860','#9b50c0','#5c3570','#c070f0','#3d1040'];

function spawnLeaves(cx, cy, colors, count) {
  for (let i = 0; i < count; i++) {
    const el  = document.createElement('div');
    el.className = 'leaf-p';
    const dur = rand(3.5, 6.5);
    el.style.cssText = `
      width:${rand(9,15)}px; height:${rand(6,10)}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      left:${cx}px; top:${cy}px;
      --dx:${rand(-90,90)}px;
      --dy:${rand(70,170)}px;
      --rot:${rand(-540,540)}deg;
      --dur:${dur}s;
      animation-delay:${rand(0,0.5)}s;
    `;
    particlesEl.appendChild(el);
    setTimeout(() => el.remove(), (dur + 1) * 1000);
  }
}

function spawnApples(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const el  = document.createElement('div');
    el.className = 'apple-p';
    const dur = rand(2.5, 4.5);
    el.style.cssText = `
      left:${cx + rand(-30,30)}px; top:${cy + rand(0,30)}px;
      --dx:${rand(-50,50)}px;
      --dy:${rand(120,200)}px;
      --rot:${rand(-240,240)}deg;
      --dur:${dur}s;
    `;
    particlesEl.appendChild(el);
    setTimeout(() => el.remove(), (dur + 1) * 1000);
  }
}

document.getElementById('life-wrap').addEventListener('click', function () {
  const r  = this.getBoundingClientRect();
  const pr = particlesEl.getBoundingClientRect();
  spawnLeaves(r.left + r.width * 0.5 - pr.left, r.top + r.height * 0.28 - pr.top, LIFE_COLORS, 22);
});

document.getElementById('know-wrap').addEventListener('click', function () {
  const r  = this.getBoundingClientRect();
  const pr = particlesEl.getBoundingClientRect();
  const cx = r.left + r.width  * 0.5 - pr.left;
  const cy = r.top  + r.height * 0.28 - pr.top;
  spawnLeaves(cx, cy, KNOW_COLORS, 16);
  spawnApples(cx, cy, 7);
});
</script>
