      <ellipse cx="450" cy="235" rx="60" ry="52" fill="#22a038" opacity=".7"/>

<section class="scene" id="scene-fall" aria-label="犯罪墮落 — The Fall of Man">

      <line x1="100" y1="135" x2="125" y2="88" stroke="#2a1400" stroke-width="5" stroke-linecap="round"/>
      <!-- Roots -->
      <path d="M85,260 Q65,275 50,278" stroke="#1e0e00" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M115,260 Q135,275 150,278" stroke="#1e0e00" stroke-width="6" fill="none" stroke-linecap="round"/>

      <path d="M115,240 Q85,225 115,210 Q140,198 115,185 Q82,172 112,158 Q140,145 118,132 Q96,122 108,110"

            style="animation:snakeSlither 3s ease-in-out infinite;"/>
      <!-- Serpent head -->
      <ellipse cx="108" cy="106" rx="8" ry="6" fill="#3a6e28"
