         viewBox="0 0 1440 400" preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

        <linearGradient id="seaSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#000820"/>
          <stop offset="65%" stop-color="#001840"/>
          <stop offset="100%" stop-color="#002a5a"/>
        </linearGradient>
      </defs>
      <rect width="1440" height="400" fill="url(#seaSky)"/>
      <circle cx="720" cy="75" r="36"
              fill="rgba(205,232,255,.88)"
              style="filter:drop-shadow(0 0 22px rgba(180,220,255,.85));"/>
      <!-- Moonbeam path on water below -->
      <path d="M710,111 Q720,200 704,400" stroke="rgba(200,232,255,.18)" stroke-width="22" fill="none"/>
      <path d="M720,111 Q720,200 720,400" stroke="rgba(200,232,255,.12)" stroke-width="9"  fill="none"/>

  <!-- Dry sea floor -->

    </div>

        <div class="water-wave-row" style="top:14%; --wd:0s;   animation-direction:reverse;"></div>

        <div class="water-wave-row" style="top:50%; --wd:-1.2s; animation-direction:reverse;"></div>
        <div class="water-wave-row" style="top:68%; --wd:-1.8s;"></div>
        <div class="water-wave-row" style="top:86%; --wd:-.4s;  animation-direction:reverse;"></div>

         role="img" aria-label="火柱 — Pillar of fire">
