<!-- ══════════════════════════════════════════════
     SCENE 1 — INTRO  開場
     ══════════════════════════════════════════════ -->
<section class="scene" id="scene-intro" aria-label="約翰三書 — 開場">
  <app-starfield />

  <div id="intro-glow" aria-hidden="true"></div>

  <div id="intro-title">
    <h1>約翰三書</h1>
    <p>大公書信 · 約翰參書</p>
    <span class="sub">愛中行走 · 以真理服事 · 款待旅人 · 見證當行</span>
  </div>

  <!-- Open scroll with quill — letter of love and truth -->

       xmlns="http://www.w3.org/2000/svg" role="img" aria-label="約翰的書信與真理之光">

    <!-- Scroll top roll -->
    <ellipse cx="90" cy="35" rx="62" ry="10" fill="#4a2c10" stroke="#9a6830" stroke-width="1.5"/>
    <!-- Scroll bottom roll -->
    <ellipse cx="90" cy="183" rx="62" ry="10" fill="#4a2c10" stroke="#9a6830" stroke-width="1.5"/>
    <!-- Scroll lines of text -->
    <line x1="48" y1="65"  x2="132" y2="65"  stroke="rgba(200,140,60,.3)" stroke-width="1.2"/>
    <line x1="48" y1="78"  x2="132" y2="78"  stroke="rgba(200,140,60,.25)" stroke-width="1"/>
    <line x1="48" y1="91"  x2="132" y2="91"  stroke="rgba(200,140,60,.25)" stroke-width="1"/>
    <line x1="48" y1="104" x2="132" y2="104" stroke="rgba(200,140,60,.25)" stroke-width="1"/>
    <line x1="48" y1="117" x2="108" y2="117" stroke="rgba(200,140,60,.2)"  stroke-width="1"/>
    <line x1="48" y1="130" x2="125" y2="130" stroke="rgba(200,140,60,.2)"  stroke-width="1"/>
    <line x1="48" y1="143" x2="115" y2="143" stroke="rgba(200,140,60,.2)"  stroke-width="1"/>
    <line x1="48" y1="156" x2="132" y2="156" stroke="rgba(200,140,60,.2)"  stroke-width="1"/>
    <!-- Decorative initial capital -->
    <text x="50" y="62" font-size="14" fill="rgba(220,160,60,.7)" font-weight="bold">愛</text>
    <!-- Quill pen -->
    <path d="M148,42 Q162,30 168,18 Q160,28 154,34 L145,60 L150,58 Z"

    <line x1="145" y1="60" x2="142" y2="75" stroke="rgba(160,100,40,.8)" stroke-width="1.2"/>

    <line x1="90" y1="35" x2="45" y2="10"  stroke="rgba(200,140,60,.1)"  stroke-width="1.2"/>
    <line x1="90" y1="35" x2="135" y2="10" stroke="rgba(200,140,60,.1)"  stroke-width="1.2"/>
    <!-- Sparks -->

      <linearGradient id="johnHorizonG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#180e04"/>

    <line x1="352" y1="178" x2="394" y2="170" stroke="rgba(220,160,60,.1)"  stroke-width="1.2"/>

<!-- ══════════════════════════════════════════════
     SCENE 3 — 接待弟兄  Hospitality
     ══════════════════════════════════════════════ -->

  <div id="hospitality-glow" aria-hidden="true"></div>

</section>

<!-- ══════════════════════════════════════════════
     SCENE 5 — 低米丟的見證  Demetrius Commended
     ══════════════════════════════════════════════ -->
<section class="scene" id="scene-demetrius" aria-label="約翰三書 — 低米丟的見證">
  <app-starfield />

  <div id="demetrius-glow" aria-hidden="true"></div>

  <app-scene-heading [title]="'低米丟的見證'" [subtitle]="'Testimony of Demetrius'" [id]="'demetrius-heading'" />

  <!-- Three witnesses / stars — truth, church, John all testify -->
  <svg id="demetrius-scene-svg" viewBox="0 0 600 380" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg" role="img" aria-label="三重見證：真理、眾人與使徒">
    <defs>
      <radialGradient id="demetGlowG" cx="50%" cy="40%" r="45%">
        <stop offset="0%" stop-color="rgba(200,150,50,.15)"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
    </defs>
    <ellipse cx="300" cy="185" rx="250" ry="160" fill="url(#demetGlowG)"/>
    <!-- Three large gleaming stars — three witnesses -->
    <!-- Star 1: Truth (真理) -->
    <g transform="translate(140,100)">
      <circle r="22" fill="rgba(210,155,50,.15)" stroke="rgba(220,165,60,.35)" stroke-width="1.5"/>
      <circle r="12" fill="rgba(220,165,60,.3)"/>
      <circle r="6"  fill="rgba(240,195,80,.5)"/>
      <line x1="0" y1="-28" x2="0" y2="28"   stroke="rgba(220,165,60,.4)" stroke-width="1.5"/>
      <line x1="-28" y1="0" x2="28" y2="0"   stroke="rgba(220,165,60,.4)" stroke-width="1.5"/>
      <line x1="-20" y1="-20" x2="20" y2="20" stroke="rgba(220,165,60,.25)" stroke-width="1"/>
      <line x1="20" y1="-20" x2="-20" y2="20" stroke="rgba(220,165,60,.25)" stroke-width="1"/>
      <text y="50" text-anchor="middle" font-size="11" fill="rgba(220,170,70,.8)">真理</text>
    </g>
    <!-- Star 2: Church (眾人) -->
    <g transform="translate(300,80)">
      <circle r="22" fill="rgba(210,155,50,.15)" stroke="rgba(220,165,60,.35)" stroke-width="1.5"/>
      <circle r="12" fill="rgba(220,165,60,.3)"/>
      <circle r="6"  fill="rgba(240,195,80,.5)"/>
      <line x1="0" y1="-28" x2="0" y2="28"   stroke="rgba(220,165,60,.4)" stroke-width="1.5"/>
      <line x1="-28" y1="0" x2="28" y2="0"   stroke="rgba(220,165,60,.4)" stroke-width="1.5"/>
