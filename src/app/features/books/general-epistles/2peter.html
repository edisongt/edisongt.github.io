  <div id="false-glow" aria-hidden="true"></div>

  <!-- Wolves in sheep's clothing / cracked masks -->

       xmlns="http://www.w3.org/2000/svg" role="img" aria-label="披著羊皮的狼與破裂的面具">

      <radialGradient id="falseGlowG" cx="50%" cy="35%" r="45%">

    </defs>
    <!-- Background glow -->

    <g transform="translate(150,110)">

<!-- ══════════════════════════════════════════════
     SCENE 5 — 主的日子  The Day of the Lord
     ══════════════════════════════════════════════ -->
<section class="scene" id="scene-day" aria-label="彼得後書 — 主的日子">
  <app-starfield />

  <div id="day-glow" aria-hidden="true"></div>

  <!-- Elements dissolving with new heavens/earth appearing -->
  <svg id="day-scene-svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg" role="img" aria-label="有形質的都要被烈火銷化與新天新地">
    <defs>
      <radialGradient id="dayGlowG" cx="50%" cy="40%" r="50%">
        <stop offset="0%" stop-color="rgba(64,112,160,.14)"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
      <linearGradient id="dissolveG" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#4070a0"/>
        <stop offset="50%" stop-color="#6090c0"/>
        <stop offset="100%" stop-color="#80b0e0"/>
      </linearGradient>
      <radialGradient id="newEarthG" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(96,144,192,.2)"/>
        <stop offset="70%" stop-color="rgba(64,112,160,.08)"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
    </defs>
    <!-- Background glow -->
    <ellipse cx="300" cy="200" rx="240" ry="170" fill="url(#dayGlowG)"/>
    <!-- Old earth dissolving (left) -->
    <g transform="translate(80,140)" opacity=".6">
      <circle cx="80" cy="80" r="60" fill="#1a3050" stroke="#2a4a6a" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="55" fill="#15283f"/>
      <!-- Continents fragmenting -->
      <path d="M55,50 Q65,45 80,50 Q85,60 75,65 Z" fill="#2a4a6a" opacity=".6"/>
      <path d="M90,70 Q100,65 105,75 Q100,85 90,82 Z" fill="#2a4a6a" opacity=".5"/>
      <path d="M60,85 Q70,80 75,90 Q68,95 58,92 Z" fill="#2a4a6a" opacity=".4"/>
      <!-- Dissolving particles rising -->
      <circle cx="60" cy="30" r="3" fill="rgba(96,144,192,.3)"/>
      <circle cx="95" cy="25" r="2.5" fill="rgba(96,144,192,.25)"/>
      <circle cx="50" cy="40" r="2" fill="rgba(96,144,192,.2)"/>
      <circle cx="110" cy="35" r="2" fill="rgba(96,144,192,.2)"/>
    </g>
    <!-- Arrow / transition between old and new -->
    <path d="M250,200 Q300,180 350,200" stroke="rgba(128,176,224,.2)" stroke-width="2" fill="none"/>
    <polygon points="345,195 355,200 345,205" fill="rgba(128,176,224,.25)"/>
    <!-- New earth forming (right) — bright, glowing -->
    <g transform="translate(340,130)">
      <circle cx="80" cy="80" r="65" fill="url(#newEarthG)"/>
      <circle cx="80" cy="80" r="60" fill="rgba(64,112,160,.12)" stroke="#6090c0" stroke-width="1.5"/>
      <circle cx="80" cy="80" r="55" fill="rgba(96,144,192,.08)"/>
      <!-- Pristine continents -->
      <path d="M55,55 Q70,45 85,55 Q90,70 75,72 Q60,70 55,55 Z" fill="#4070a0" opacity=".4"/>
      <path d="M85,80 Q100,75 108,88 Q100,98 88,95 Z" fill="#4070a0" opacity=".35"/>
      <path d="M58,88 Q68,82 78,90 Q72,100 60,96 Z" fill="#4070a0" opacity=".3"/>
      <!-- Light halo -->
      <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(128,176,224,.1)" stroke-width="2"/>
